name: Fix Wild Battle Grade Filter
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply grade filter patch
        run: |
          python3 - << 'PYEOF'
          import sys
          with open('learningbm_index.html', 'r', encoding='utf-8') as f:
              src = f.read()
          ok = True

          # Fix 1: renderPvEAreaSelect に学年フィルターを追加
          old1 = "const list = PVE_AREAS.filter(a => a.subject === districtId);"
          new1 = """let list;
          if (typeof CURRICULUM !== 'undefined' && typeof currentUser !== 'undefined' && currentUser && currentUser.grade) {
            const subjectKey = {math:'math',jp:'japanese',social:'social',science:'science'}[districtId] || districtId;
            const subjectData = CURRICULUM[subjectKey];
            const gradeKey = String(currentUser.grade);
            if (subjectData && subjectData.grades && subjectData.grades[gradeKey]) {
              list = (subjectData.grades[gradeKey].units || []).map(u => ({
                id: u.id, subject: districtId, name: u.name, emoji: u.icon || '\U0001F4DA', desc: u.desc || '', disabled: false
              }));
            } else {
              list = PVE_AREAS.filter(a => a.subject === districtId);
            }
          } else {
            list = PVE_AREAS.filter(a => a.subject === districtId);
          }"""
          if old1 in src:
              src = src.replace(old1, new1, 1)
              print("Fix 1 applied")
          else:
              print("WARNING: Fix 1 target not found")
              ok = False

          # Fix 2a: _genPvE_curriculum に学年変数を追加
          old2a = "function _genPvE_curriculum(areaId) {"
          new2a = "function _genPvE_curriculum(areaId) {\n  const playerGrade = (typeof currentUser !== 'undefined' && currentUser && currentUser.grade) ? String(currentUser.grade) : null;"
          if old2a in src:
              src = src.replace(old2a, new2a, 1)
              print("Fix 2a applied")
          else:
              print("WARNING: Fix 2a target not found")
              ok = False

          # Fix 2b: 内側ループに学年フィルターを追加
          old2b = "    for (const [g, gd] of Object.entries(sd.grades)) {"
          new2b = "    for (const [g, gd] of Object.entries(sd.grades)) {\n      if (playerGrade && g !== playerGrade) continue;"
          if old2b in src:
              src = src.replace(old2b, new2b, 1)
              print("Fix 2b applied")
          else:
              print("WARNING: Fix 2b target not found")
              ok = False

          with open('learningbm_index.html', 'w', encoding='utf-8') as f:
              f.write(src)
          sys.exit(0 if ok else 1)
          PYEOF
      - name: Commit and push fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add learningbm_index.html
          git diff --staged --quiet && echo "No changes" || (git commit -m "fix: 野生バトルを学年別フィルター対応に修正" && git push)
