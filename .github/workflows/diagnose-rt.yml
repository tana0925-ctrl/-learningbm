name: Diagnose RT Battle Code
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - diagnose-rt.yml
      - scripts/diagnose-rt.py
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run RT diagnostic script
        run: python3 scripts/diagnose-rt.py
