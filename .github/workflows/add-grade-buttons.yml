name: Add Grade Selection Buttons
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix grade button insertion anchor
        run: |
          python3 - << 'PYEOF'
          import sys
          with open('learningbm_index.html', 'r', encoding='utf-8') as f:
            src = f.read()
          if 'distWrap3' in src:
            print('Already applied - skipping')
            sys.exit(0)
          marker = "grades0 = ['1','2','3','4','5','6']"
          old_ins = "if (areaWrap && areaWrap.parentNode) areaWrap.parentNode.insertBefore(gradeEl0, areaWrap);"
          new_ins = "const distWrap3 = document.getElementById('pveDistrictSelect');\n    if (distWrap3 && distWrap3.parentNode) distWrap3.parentNode.insertBefore(gradeEl0, distWrap3);"
          idx = src.find(marker)
          if idx < 0:
            print('WARNING: marker not found')
            sys.exit(1)
          region_start = max(0, idx - 600)
          region = src[region_start:idx + 100]
          if old_ins not in region:
            print('WARNING: areaWrap line not found near marker')
            sys.exit(1)
          new_region = region.replace(old_ins, new_ins, 1)
          src = src[:region_start] + new_region + src[idx + 100:]
          with open('learningbm_index.html', 'w', encoding='utf-8') as f:
            f.write(src)
          print('Patch applied')
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add learningbm_index.html
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "fix: 学年ボタン挿入先をpveDistrictSelectに変更（初回表示バグ修正）" && git push)
